<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoEdu | Terminal Tablet</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #0f172a; --card: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: var(--card); padding: 30px; border-radius: 16px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        #reader { width: 100%; margin-top: 20px; border-radius: 12px; overflow: hidden; border: 2px solid #334155; }
        #feedback {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 20px 40px; border-radius: 12px; font-size: 1.3rem; font-weight: bold;
            z-index: 9999; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            animation: slideDown 0.5s ease-out; white-space: pre-wrap;
        }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }
        .info-text { margin-top: 15px; color: #94a3b8; font-size: 0.9rem; }
        #nome-unidade { color: #818cf8; font-weight: bold; }
    </style>
</head>
<body>

    <div id="feedback"></div>

    <div id="login-area" class="card">
        <h2>Ativar Totem Tablet</h2>
        <p class="info-text">Identifique a unidade de ensino para começar</p>
        <input type="text" id="t-cnpj" placeholder="CNPJ da Escola">
        <input type="password" id="t-senha" placeholder="Senha de Acesso">
        <button onclick="ativarTablet()">Ativar Dispositivo</button>
    </div>

    <div id="ponto-area" class="card" style="display: none;">
        <h2 id="nome-unidade">Carregando Unidade...</h2>
        <p style="margin-top: 5px; color: #cbd5e1;">Aponte a carteirinha QR Code para a câmera</p>

        <div id="reader"></div>

        <p class="info-text">O sistema impedirá duplicidades automáticas no mesmo dia.</p>
        <button onclick="sair()" style="margin-top: 20px; background: #334155; padding: 8px;">Sair / Trocar Escola</button>
    </div>

    <script>
        // Sincroniza dinamicamente com a URL base que está hospedando o app
        const API_URL = window.location.origin + "/api";
        let config = JSON.parse(localStorage.getItem("config_tablet"));

        function iniciar() {
            if (config) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('ponto-area').style.display = 'block';
                document.getElementById('nome-unidade').innerText = config.nome;
                startScanner();
            }
        }

        async function activarTablet() {
            const cnpj = document.getElementById('t-cnpj').value.replace(/\D/g, '');
            const senha = document.getElementById('t-senha').value;

            try {
                const res = await fetch(`${API_URL}/clientes/login-tablet`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ cnpj, senha })
                });

                if (res.ok) {
                    const dados = await res.json();
                    config = { id: dados.id, nome: dados.nome };
                    localStorage.setItem("config_tablet", JSON.stringify(config));
                    location.reload();
                } else { mostrarFeedback("Acesso negado!", "erro"); }
            } catch (e) { mostrarFeedback("Erro ao conectar com o servidor", "erro"); }
        }

        function startScanner() {
            const scanner = new Html5QrcodeScanner("reader", {
                fps: 10,
                qrbox: { width: 250, height: 250 }
            });

            scanner.render(async (conteudoLido) => {
                if (window.processandoPonto) return;
                window.processandoPonto = true;

                const matriculaLimpa = conteudoLido.replace(/\D/g, "");

                try {
                    const res = await fetch(`${API_URL}/ponto/registrar`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            id_cliente: config.id,
                            matricula: matriculaLimpa
                        })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        let msg = `PRESENÇA CONFIRMADA!\nAluno: ${data.aluno}\nTurma: ${data.turma}\nHora: ${data.hora}`;
                        mostrarFeedback(msg, "sucesso");
                    } else {
                        mostrarFeedback(data.erro || "ERRO NO REGISTRO", "erro");
                    }
                } catch (e) {
                    mostrarFeedback("FALHA DE COMUNICAÇÃO", "erro");
                } finally {
                    // Timeout de 4 segundos para o aluno se afastar sem registrar repetido
                    setTimeout(() => { window.processandoPonto = false; }, 4000);
                }
            });
        }

        function mostrarFeedback(mensagem, tipo) {
            const fb = document.getElementById('feedback');
            fb.innerText = mensagem;
            fb.style.display = 'block';
            fb.style.background = tipo === "sucesso" ? "var(--success)" : "var(--danger)";
            setTimeout(() => { fb.style.display = 'none'; }, 3500);
        }

        function sair() {
            if(confirm("Deseja desativar este totem?")) {
                localStorage.clear();
                location.reload();
            }
        }

        iniciar();
    </script>
</body>
</html>
