<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoEdu | Terminal Tablet</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --success: #10b981; /* Verde esmeralda para entrada */
            --info: #3b82f6;    /* Azul para saída */
            --danger: #ef4444;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: var(--card); padding: 30px; border-radius: 16px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        #reader { width: 100%; margin-top: 20px; border-radius: 12px; overflow: hidden; border: 2px solid #334155; background: #000; min-height: 250px; }

        #feedback {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 25px 40px; border-radius: 12px; font-size: 1.4rem; font-weight: bold;
            z-index: 9999; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideDown 0.4s ease-out; white-space: pre-wrap; width: 85%; max-width: 400px;
        }
        @keyframes slideDown { from { top: -120px; } to { top: 20px; } }
        .info-text { margin-top: 15px; color: #94a3b8; font-size: 0.9rem; }
        #nome-unidade { color: #818cf8; font-weight: bold; }
    </style>
</head>
<body>

    <div id="feedback"></div>

    <div id="login-area" class="card">
        <h2>Ativar Totem Tablet</h2>
        <p class="info-text">Identifique a escola usando o CNPJ e Senha configurados no painel administrativo.</p>
        <input type="text" id="t-cnpj" placeholder="CNPJ da Escola">
        <input type="password" id="t-senha" placeholder="Senha de Acesso (Totem)">
        <button onclick="ativarTablet()">Ativar Dispositivo</button>
    </div>

    <div id="ponto-area" class="card" style="display: none;">
        <h2 id="nome-unidade">Carregando Unidade...</h2>
        <p style="margin-top: 5px; color: #cbd5e1;">Aponte a carteirinha QR Code para a câmera</p>

        <div id="reader"></div>

        <p class="info-text">O sistema registrará Saída automaticamente se o aluno já tiver entrado hoje.</p>
        <button onclick="sair()" style="margin-top: 20px; background: #334155; padding: 8px;">Sair / Desativar Totem</button>
    </div>

    <script>
        // Configuração dinâmica de URL baseado no ambiente (Localhost vs Vercel)
        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://127.0.0.1:5000/api"
            : window.location.origin + "/api";

        let config = JSON.parse(localStorage.getItem("config_tablet"));
        let html5Qrcode = null;

        function iniciar() {
            if (config) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('ponto-area').style.display = 'block';
                document.getElementById('nome-unidade').innerText = config.nome;
                startScannerDireto();
            }
        }

        // Função corrigida e unificada para evitar erros de referência cruzada
        async function ativarTablet() {
            const cnpj = document.getElementById('t-cnpj').value.replace(/\D/g, '');
            const senha = document.getElementById('t-senha').value.trim();

            if(!cnpj || !senha) {
                alert("Preencha todos os campos.");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/clientes/login-tablet`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ cnpj, senha })
                });

                if (res.ok) {
                    const dados = await res.json();
                    config = { id: dados.id, nome: dados.nome };
                    localStorage.setItem("config_tablet", JSON.stringify(config));
                    location.reload();
                } else {
                    mostrarFeedback("Acesso negado! Credenciais inválidas.", "erro");
                }
            } catch (e) {
                mostrarFeedback("Erro ao se conectar com o servidor.", "erro");
            }
        }

        function startScannerDireto() {
            html5Qrcode = new Html5Qrcode("reader");
            const configScanner = { fps: 15, qrbox: { width: 250, height: 250 } };

            html5Qrcode.start(
                { facingMode: "environment" },
                configScanner,
                onScanSuccess
            ).catch(err => {
                html5Qrcode.start({ facingMode: "user" }, configScanner, onScanSuccess)
                    .catch(e => console.error("Nenhuma câmera encontrada.", e));
            });
        }

        async function onScanSuccess(conteudoLido) {
            if (window.processandoPonto) return;
            window.processandoPonto = true;

            const matriculaLimpa = conteudoLido.replace(/\D/g, "");

            try {
                const res = await fetch(`${API_URL}/ponto`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        matricula: matriculaLimpa
                    })
                });

                const data = await res.json();

                if (res.ok && data.status === "sucesso") {
                    let acao = data.tipo === "ENTRADA" ? "ENTRADA CONFIRMADA!" : "SAÍDA CONFIRMADA!";
                    let msg = `${acao}\n\nAluno: ${data.aluno}\nHora: ${data.hora}`;
                    mostrarFeedback(msg, data.tipo.toLowerCase());
                } else {
                    mostrarFeedback(data.mensagem || "ERRO NO REGISTRO", "erro");
                }
            } catch (e) {
                mostrarFeedback("FALHA DE CONEXÃO", "erro");
            } finally {
                // Bloqueia leituras duplicadas no mesmo segundo (Debounce de 4s)
                setTimeout(() => { window.processandoPonto = false; }, 4000);
            }
        }

        function mostrarFeedback(mensagem, tipo) {
            const fb = document.getElementById('feedback');
            fb.innerText = mensagem; 
            fb.style.display = 'block';

            if (tipo === "entrada") {
                fb.style.background = "var(--success)"; 
            } else if (tipo === "saída" || tipo === "saida") {
                fb.style.background = "var(--info)";    
            } else {
                fb.style.background = "var(--danger)";  
            }

            setTimeout(() => { fb.style.display = 'none'; }, 3500);
        }

        function sair() {
            if(confirm("Deseja desativar este totem?")) {
                if (html5Qrcode && html5Qrcode.isScanning) {
                    html5Qrcode.stop().then(() => {
                        localStorage.clear();
                        location.reload();
                    });
                } else {
                    localStorage.clear();
                    location.reload();
                }
            }
        }

        iniciar();
    </script>
</body>
</html>
